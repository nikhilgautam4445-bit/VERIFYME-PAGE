<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            background-color:#f8f9fa;
            font-family:Arial, Helvetica, sans-serif;
        }

        .outer-box{
            width:900px;
            min-height:700px;
            margin:50px auto;
            background:#7296a2;
            border:1px solid #d8e7dd;
            border-radius:18px;
            padding:40px;
        }

        .inner-box{
            width:650px;
            margin:40px auto;
            background:#fff;
            border-radius:18px;
            padding:40px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h2{
            color:#0d4e7c;
            font-weight:700;
        }

        .footer{
            text-align:center;
            color:#6c757d;
            margin-top:20px;
            font-size:15px;
        }
    </style>
</head>

<body>

<div class="outer-box">

    <div class="text-center">
        <h2>● VerifyMe</h2>
        <p class="text-muted">
            Open your account — it takes about 3 minutes
        </p>
    </div>

    <div class="inner-box">

        <h4 class="text-center mb-4">
           <strong>1.</strong>IDENTITY
        </h4>
   <div class="mb-3">
    <label class="form-label">Full legal name</label>
    <input type="text"  class="form-control" placeholder="Enter your full name">
   </div>
   <div class="mb-3">
    <label class="form-label">Email</label><br>
    <INPUT type="email" class="FORM-CONTROL" placeholder="Enter your email address">
   </div>
   <div class="mb-3">
  <label class="form-label">Mobile Number</label>
 
    <div class="input-group">
        <span class="input-group-text">+91</span>
        <input type="tel" class="form-control"  maxlength="10" placeholder="10-digit mobile">
    </div></div>
    <div class="mb-3">
        <label class="form-label">PAN</label>
        <div class="input-group">
            <span class="input-group-text">💳</span>
            <input class="form-control"    placeholder="ABCDE1234F"
            maxlength="10">
        </div>
        <div class="container mt-5">
    <div class="d-flex justify-content-between">

       <button type="button" class="btn btn-outline-secondary px-4">
            Back
        </button>

      <a href="index2.html" > <button type="button" class="btn btn-success px-4">
            Continue
        </button></a>

    </div>
        
       
       
    </div>


    <div class="footer">
        🔒 Bank-grade encryption · Your data is never sold
    </div>

</div>
</div></div></body>


</html>
